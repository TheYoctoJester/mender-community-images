# systemd-tmpfiles snippet: on first boot, copy the build-time content of
# /var/lib/mender (device_type, mender.conf, ...) into /data/mender, but leave
# it alone on subsequent boots. /data/mender then gets bind-mounted over
# /var/lib/mender by var-lib-mender.mount, so the Mender state DB and the agent
# key live on the persistent /data partition and survive the rootfs swap of an
# A/B OTA. Without this, post-reboot mender has no record of the deployment and
# the server stays at "rebooting" even though the bootloader slot switch was
# correct.
#
# Type 'C' copies a tree from the trailing argument to the path only if the
# path does not already exist.
C /data/mender 0700 root root - /var/lib/mender
