# qemuarm64 machine for the ISAR Debian A/B Mender demo.
#
# Builds on the stock ISAR qemuarm64 (arm64, virtio-blk on /dev/vda, ttyAMA0).
# The rootfs .ext4 is the OTA payload (wrapped into a module-image artifact of
# type efibootmgr-rootfs). The bootable A/B .wic disk is added for the boot/OTA
# bring-up (fixed PARTUUIDs on rootA/rootB; ESP holds the EFI-stub kernel+initrd).
require conf/machine/qemuarm64.conf

# Fixed PARTUUIDs so the first-boot fallback + per-slot UEFI entries can name the
# rootfs slots deterministically (the efibootmgr integration relies on these).
MENDER_ISAR_ROOTA_UUID ?= "11111111-1111-1111-1111-111111111101"
MENDER_ISAR_ROOTB_UUID ?= "11111111-1111-1111-1111-111111111102"

# M1 (rootfs green): produce the ext4 rootfs payload. The bootable wic disk +
# WKS_FILE/IMAGE_BOOT_FILES are enabled in M2 with the boot-chain bring-up.
IMAGE_FSTYPES = "ext4"
