# qemuarm64 machine for the ISAR Debian A/B Mender demo.
#
# Builds on the stock ISAR qemuarm64 (arm64, virtio-blk on /dev/vda, ttyAMA0).
# Produces the rootfs .ext4 (the OTA payload, wrapped as a module-image artifact
# of type efibootmgr-rootfs) and a bootable A/B .wic disk. A/B slot selection is
# owned by the efibootmgr Mender update module (UEFI boot variables), so there is
# no bootloader on the disk -- the firmware launches an EFI-stub kernel directly.
require conf/machine/qemuarm64.conf

# Fixed PARTUUIDs so the first-boot UKI fallback + per-slot UEFI entries can name
# the rootfs slots deterministically (the efibootmgr integration relies on these).
MENDER_ISAR_ROOTA_UUID ?= "11111111-1111-1111-1111-111111111101"
MENDER_ISAR_ROOTB_UUID ?= "11111111-1111-1111-1111-111111111102"
WICVARS:append = " MENDER_ISAR_ROOTA_UUID MENDER_ISAR_ROOTB_UUID"

IMAGE_FSTYPES = "ext4 wic"
WKS_FILE = "qemuarm64-mender-ab.wks"

# wic imager needs FAT/ext tooling to build the ESP + partitions.
IMAGER_INSTALL:wic += "dosfstools mtools parted e2fsprogs"
