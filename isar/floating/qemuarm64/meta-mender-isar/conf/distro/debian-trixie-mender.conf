# Debian trixie with the Mender device-components apt repo added, so the image
# can install mender-client4 from apt. Appends to (does not replace) the base
# trixie sources -- the first DISTRO_APT_SOURCES entry stays the bootstrap repo.
require conf/distro/debian-trixie.conf

DISTRO_APT_SOURCES += "conf/distro/mender-device-components.list"
THIRD_PARTY_APT_KEYS += "https://downloads.mender.io/repos/debian/gpg;sha256sum=18df5685a692af07576658dd0a77a2ee1343fe57a55cd1ae17d92b00370a79ce"
