header:
  version: 14
  includes:
  - include/mender-full.yml
  - include/raspberrypi.yml

machine: raspberrypi5

local_conf_header:
  raspberrypi5: |
    KERNEL_IMAGETYPE_UBOOT ?= "Image"
    KERNEL_BOOTCMD ?= "booti"
    UBOOT_MACHINE = "rpi_arm64_config"

  # NOTE: bcm2712d0.dtbo is NOT available in the kirkstone-era kernel
  # (6.1.x). The overlay exists in scarthgap+ kernels only. Kirkstone
  # RPi5 images will boot without it, but the 2GB D0 variant may lack
  # full support.
