header:
  version: 14
  includes:
  - include/mender-base.yml

machine: qemuarm64-swupdate

target:
  - all-images

repos:
  mender-community-images:
    layers:
      yocto/kirkstone/demos/meta-mender-swupdate:

  meta-openembedded:
    layers:
      meta-python:
      meta-networking:
      meta-filesystems:

  meta-swupdate:
    url: https://github.com/sbabic/meta-swupdate.git
    branch: kirkstone

  meta-mender:
    layers:
      meta-mender-demo:

  meta-mender-community:
    url: https://github.com/mendersoftware/meta-mender-community.git
    branch: kirkstone
    layers:
      meta-mender-client-only:
      meta-mender-update-modules:

local_conf_header:
  no-full-client: |
    MENDER_EFI_LOADER = ""
    MENDER_UPDATE_POLL_INTERVAL_SECONDS = "5"
    MENDER_INVENTORY_POLL_INTERVAL_SECONDS = "5"
    MENDER_RETRY_POLL_INTERVAL_SECONDS = "30"

  swupdate: |
    SWUPDATE_HARDWARE_VERSION = "1.0"
    SWUPDATE_SOFTWARE_VERSION = "1.0"
