# Digilent Arty Z7-20 (Zynq-7000 xc7z020, 512 MB DDR3) — Mender OTA build,
# including FPGA (PL) bitstream OTA via the fpga-bitstream update module.
# Wrynose (Yocto 6.0) variant, floating-only.
#
# Board support comes from meta-mender-xilinx (+ the nested meta-arty-z7 BSP
# sub-layer) in meta-mender-community.
#
# EXPERIMENTAL: meta-xilinx has no released wrynose branch yet, so this pins its
# wrynose-next staging branch. The config has not been build- or
# hardware-verified on wrynose (the scarthgap variant is the tested one).
#
# The Vivado-free bitstream build flow used to produce fpga-bitstream artifacts
# lives in the Arty Z7-20 Mender Hub tutorial, not in this repository.
header:
  version: 14
  includes:
  - include/mender-full.yml
  - include/arm.yml

repos:
  meta-mender-community:
    url: https://github.com/mendersoftware/meta-mender-community.git
    branch: wrynose
    layers:
      meta-mender-xilinx:
      meta-mender-xilinx/meta-arty-z7:

  meta-xilinx:
    url: https://github.com/Xilinx/meta-xilinx
    # meta-xilinx has not cut a wrynose branch yet; wrynose-next is its staging
    # branch. Flip to `branch: wrynose` once upstream opens it (cf. the wrynose
    # pinning note in the top-level README).
    branch: wrynose-next
    layers:
      meta-xilinx-core:

local_conf_header:
  arty-z7-20: |
    # A/B SD layout with raw redundant U-Boot env; the u-boot-xlnx fork provides
    # the "u-boot" recipe meta-mender expects.
    MENDER_FEATURES_ENABLE:append = " mender-uboot mender-image-sd"
    MENDER_FEATURES_DISABLE:append = " mender-grub mender-image-uefi"
    PREFERRED_PROVIDER_u-boot = "u-boot-xlnx"
    # Pin the xlnx component set (linux-xlnx 6.12, u-boot-xlnx 2025.01) so a
    # future meta-xilinx default bump cannot change component versions. This is
    # also the set the Mender U-Boot patches were rebased against.
    XILINX_RELEASE_VERSION = "v2025.1"
    # FPGA (PL) bitstream OTA. Deploy bitstream artifacts built per the Arty
    # Z7-20 Mender Hub tutorial (Vivado-free openXC7 flow) with `mender-artifact
    # write module-image -T fpga-bitstream --software-filesystem data-partition`.
    IMAGE_INSTALL:append = " fpga-bitstream-module"

machine: arty-z7-20
