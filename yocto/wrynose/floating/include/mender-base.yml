header:
  version: 14

distro: poky

repos:
  openembedded-core:
    url: git://git.openembedded.org/openembedded-core.git
    branch: master
    layers:
      meta:

  bitbake:
    url: git://git.openembedded.org/bitbake.git
    branch: master
    layers:
      bitbake: disabled

  meta-yocto:
    url: git://git.yoctoproject.org/git/meta-yocto.git
    branch: master
    layers:
      meta-poky:
      meta-yocto-bsp:

  meta-openembedded:
    url: git://git.openembedded.org/meta-openembedded
    branch: master
    layers:
      meta-oe:

  meta-mender:
    url: https://github.com/leon-anavi/meta-mender.git
    branch: leon/master-wrynose
    patches:
      uboot-workdir-fix:
        repo: meta-mender-community
        path: patches/meta-mender/0002-uboot-auto-configure-use-WORKDIR-instead-of-B.patch
      remove-s-workdir-git:
        repo: meta-mender-community
        path: patches/meta-mender/0003-remove-S-WORKDIR-git-assignments-for-wrynose.patch
      uboot-host-strip:
        repo: meta-mender-community
        path: patches/meta-mender/0004-uboot-auto-configure-use-host-strip-for-envtools.patch

    layers:
      meta-mender-core:

  meta-mender-community:
    url: https://github.com/theyoctojester/meta-mender-community.git
    branch: tyj/rpi-wrynose-validation-fixes

local_conf_header:
  base: |
    CONF_VERSION = "2"
    PACKAGE_CLASSES = "package_ipk"
    INIT_MANAGER = "systemd"

  mender-artifact: |
    MENDER_ARTIFACT_NAME = "gha_autobuild"

target:
  - core-image-minimal
