header:
  version: 14

distro: poky

repos:
  openembedded-core:
    url: https://git.openembedded.org/openembedded-core.git
    branch: wrynose
    layers:
      meta:

  bitbake:
    url: https://git.openembedded.org/bitbake.git
    branch: master
    layers:
      bitbake: disabled

  meta-yocto:
    url: https://git.yoctoproject.org/git/meta-yocto.git
    branch: wrynose
    layers:
      meta-poky:
      meta-yocto-bsp:

  meta-openembedded:
    url: https://git.openembedded.org/meta-openembedded
    branch: wrynose
    layers:
      meta-oe:

  # Downstream workaround: master-next f81cb860 has an incomplete WORKDIR ->
  # UNPACKDIR migration in mender-client-cpp.inc that breaks mender-5.1.0
  # do_install on every wrynose floating board. The fork carries a single-
  # commit fix on top of upstream master-next; drop this override once
  # mendersoftware/meta-mender master-next picks up the fix.
  meta-mender:
    url: https://github.com/TheYoctoJester/meta-mender.git
    branch: fix/wrynose-mender-client-cpp-unpackdir

    layers:
      meta-mender-core:

local_conf_header:
  base: |
    CONF_VERSION = "2"
    PACKAGE_CLASSES = "package_ipk"
    INIT_MANAGER = "systemd"

  mender-artifact: |
    MENDER_ARTIFACT_NAME = "gha_autobuild"

target:
  - core-image-minimal
