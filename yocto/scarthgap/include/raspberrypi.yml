header:
  version: 14

repos:
  meta-raspberrypi:
    url: https://github.com/agherzan/meta-raspberrypi.git
    commit: 2c646d29912dcc873469a57b1c207e1549c5094d

  meta-lts-mixins:
    url: https://git.yoctoproject.org/meta-lts-mixins
    commit: a44882db02a0ed0f149371831bfbe067665eb42b

  meta-mender-community:
    url: https://github.com/mendersoftware/meta-mender-community.git
    commit: 60045b206d314c5a7eb481f306bde74c1ea16e18
    layers:
      meta-mender-raspberrypi:

local_conf_header:
  raspberrypi: |
    RPI_USE_U_BOOT = "1"
    ENABLE_UART = "1"
    MENDER_BOOT_PART_SIZE_MB = "100"
    IMAGE_INSTALL:append = " kernel-image kernel-devicetree"
    IMAGE_FSTYPES:remove = " rpi-sdimg"
