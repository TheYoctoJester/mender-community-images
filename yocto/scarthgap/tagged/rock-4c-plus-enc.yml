header:
  version: 14
  includes:
  - ../include/mender-full.yml
  - ../include/arm.yml
  - ../include/rockchip.yml

machine: rock-4c-plus
target: core-image-enc

# OP-TEE-as-fTPM demo variant of rock-4c-plus: boots with an OP-TEE
# firmware TPM and a LUKS-encrypted data partition. The demo layer
# and core-image-enc recipe live in meta-mender-community upstream
# (merged in mendersoftware/meta-mender-community#498).
#
# The shared ../include/rockchip.yml pin of meta-mender-community
# predates the demo merge, so override the pin locally for this
# wrapper rather than bumping the shared pin for every rockchip
# board at once. meta-security is pinned to the same commit the
# upstream demo references.
repos:
  meta-mender-community:
    url: https://github.com/mendersoftware/meta-mender-community.git
    commit: e4abe36b0b7b3e4bdeeb3cea07a6b329a6d3af4e
    layers:
      meta-mender-rockchip:
      kas/demos/meta-mender-rockchip-optee:

  meta-security:
    url: https://git.yoctoproject.org/meta-security
    commit: bc865c5276c2ab4031229916e8d7c20148dfbac3
    layers:
      meta-tpm:

  meta-openembedded:
    layers:
      meta-oe:
      meta-python:

local_conf_header:
  rock-4c-plus: |
    MENDER_UBOOT_STORAGE_INTERFACE = "mmc"
    MENDER_UBOOT_STORAGE_DEVICE = "1"
    IMAGE_CLASSES += "rockchip-sdimg"
    MENDER_STORAGE_DEVICE = "/dev/mmcblk1"
  rockchip-optee: |
    MACHINE_ESSENTIAL_EXTRA_RDEPENDS:remove = "u-boot-extlinux"

    IMAGE_INSTALL:append = " optee-os optee-client optee-examples optee-test optee-os-tadevkit nano"
    IMAGE_INSTALL:append = " kernel-modules "
    IMAGE_FSTYPES:remove = "wic wic.bmap mender.bmap"

    MACHINE_FEATURES:append = " optee"
    DISTRO_FEATURES:append = " optee"
    DISTRO_FEATURES:append = " tpm2 "

    IMAGE_INSTALL:append = " tpm2-tools tpm2-tss tpm2-abrmd "
  static-partition: |
    MENDER_EXTRA_PARTS = "part1"
    MENDER_EXTRA_PARTS[part1] = "--label=encrypted --fstype=ext4"
    MENDER_EXTRA_PARTS_SIZES_MB[part1] = "64"
